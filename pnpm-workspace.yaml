# Single-root install (Nx orchestrates projects, not pnpm workspaces). The
# lockfile has only the "." importer. Declaring "." keeps older/newer pnpm
# happy — a pnpm-workspace.yaml with no `packages` field errors on some pnpm
# versions ("packages field missing or empty").
packages:
  - '.'

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - '@swc/core'
  - esbuild
  - nx
  - prisma
  - sharp
  - unrs-resolver
