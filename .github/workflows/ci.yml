name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: starter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/starter_test?schema=public
      PORT: 3000
      GLOBAL_PREFIX: api
      PUBLIC_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:4200
      CORS_ORIGIN: http://localhost:4200,http://localhost:4300
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: 'false'
      ACCESS_TOKEN_SECRET: ci-test-access-secret-min-16-chars
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_SECRET: ci-test-refresh-secret-min-16-chars
      REFRESH_TOKEN_TTL: 7d
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run migrations
        run: pnpm prisma:migrate

      - name: Lint
        run: pnpm nx run-many -t lint

      - name: Build
        run: pnpm nx run-many -t build --projects=api,app,web --parallel=2
