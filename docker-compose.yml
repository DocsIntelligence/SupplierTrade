## Local-dev infra for the starter.
## Bring up: `docker compose up -d`
## Bring down: `docker compose down`
## Data is persisted to named volumes — `docker compose down -v` to wipe.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter
      POSTGRES_DB: starter
    ports: ['5432:5432']
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U starter -d starter']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ['6379:6379']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  maildev:
    ## Catch-all SMTP + a web UI so you can see queued mail.
    image: maildev/maildev:latest
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '1080:1080' # Web UI

volumes:
  postgres-data:
  redis-data:
  minio-data:
